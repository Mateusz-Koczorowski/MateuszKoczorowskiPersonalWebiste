name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script configured; skipping unit tests."
          fi

      - name: Playwright tests
        run: |
          if ls playwright.config.{js,ts,mjs,cjs} >/dev/null 2>&1; then
            if node -e "process.exit(require('./package.json').scripts?.['test:e2e'] ? 0 : 1)"; then
              npm run test:e2e
            else
              npx playwright test
            fi
          else
            echo "No Playwright config found; skipping Playwright tests."
          fi
